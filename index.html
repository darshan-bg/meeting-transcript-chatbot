<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Transcript Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; flex-direction: column; height: 100vh; color: #333; }
        header { background-color: #1e293b; color: white; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .config-panel { background-color: white; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .file-label { background-color: #3b82f6; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        #file-input { display: none; }
        #file-status { font-size: 0.9rem; color: #64748b; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 0.95rem; }
        .user { background-color: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .assistant { background-color: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #e2e8f0; white-space: pre-line; }
        .loading { font-style: italic; color: #64748b; }
        .input-panel { padding: 15px 20px; background-color: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        #chat-input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; outline: none; }
        #chat-input:focus { border-color: #3b82f6; }
        #send-btn { background-color: #1e293b; color: white; border: none; padding: 0 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background-color: #334155; }
    </style>
</head>
<body>

    <header>💬 Meeting Transcript Assistant</header>

    <div class="config-panel">
        <label for="file-input" class="file-label">Upload Transcript (.txt)</label>
        <input type="file" id="file-input" accept=".txt">
        <span id="file-status">No file chosen</span>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message assistant">Hello! Please upload a meeting transcript above, then type your question or instructions below.</div>
    </div>

    <div class="input-panel">
        <input type="text" id="chat-input" placeholder="Ask Claude anything about the meeting notes..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script>
        // 1. Paste your exact AWS API Gateway Endpoint URL below
        // actual api-id is removed from the below URL
        const API_URL = "https://api-id.execute-api.us-east-1.amazonaws.com/dev/meeting-summary";
        
        let fileContent = "";
        const fileInput = document.getElementById('file-input');
        const fileStatus = document.getElementById('file-status');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // Handle reading the local file straight into memory
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileStatus.innerText = `Loaded: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(evt) {
                fileContent = evt.target.result;
                chatInput.disabled = false;
                sendBtn.disabled = false;
            };
            reader.readAsText(file);
        });

        // Handle sending the request to AWS
        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query || !fileContent) return;

            // Append User message to UI
            appendMessage(query, 'user');
            chatInput.value = "";

            // Append a temporary loading bubble
            const loadingId = appendMessage("Claude is thinking...", 'assistant loading');

            // Build JSON payload matching your Lambda handler expectations
            const payload = {
                instruction: query,
                transcript: fileContent
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const data = await response.json();
                    appendMessage(data.response, 'assistant');
                } else {
                    appendMessage(`Error from backend server: Status ${response.status}`, 'assistant');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage(`Failed to reach API Gateway. Ensure CORS is enabled and deployed. Details: ${error}`, 'assistant');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            msgDiv.id = uniqueId;
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return uniqueId;
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
